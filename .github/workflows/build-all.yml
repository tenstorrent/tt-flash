name: Build All
run-name: Build All
on:
  workflow_dispatch:
  workflow_call:
    inputs:
      ref:
        default: ${{ github.ref }}
        required: false
        type: string
      MAJOR:
        required: false
        type: string
      MINOR:
        required: false
        type: string
      PATCH:
        required: false
        type: string
      NUMBER_OF_COMMITS_SINCE_TAG:
        required: false
        type: string

jobs:
  build_all_depends:
    name: Build All the packages!
    runs-on: ubuntu-latest
    steps:
      - run: echo "Ok, so here we go for building *ALL* the packages.  I said *ALL* of them now!"
      - run: |
          echo "What started this ref: ${{ github.ref }}"
          echo "What started this sha: ${{ github.sha }}"
          echo "Did we get a ref pass in? ${{ inputs.ref }}"
  # Sunset the debian build for now, keeping the code here for now for reference.
  # builddebian:
  #   needs:
  #     - build_all_depends
  #   name: Build Ubuntu / Debian
  #   uses: ./.github/workflows/build-debian.yml
  #   with:
  #     ref: ${{ inputs.ref }}
  #     MAJOR:  ${{ inputs.MAJOR }}
  #     MINOR:  ${{ inputs.MINOR }}
  #     PATCH:  ${{ inputs.PATCH }}
  #     NUMBER_OF_COMMITS_SINCE_TAG:  ${{ inputs.NUMBER_OF_COMMITS_SINCE_TAG }}
  #   secrets: inherit
  buildpypi:
    needs:
      - build_all_depends
    uses: ./.github/workflows/build-pypi.yml
    with:
      ref: ${{ inputs.ref }}
    secrets: inherit
  buildpyinstaller:
    needs:
      - build_all_depends
      - buildpypi
    name: Build PyInstaller binary
    uses: ./.github/workflows/build-pyinstaller.yml
    with:
      ref: ${{ inputs.ref }}
    secrets: inherit

  # Single artifact so you can share one workflow-run link; Artifacts → "tt-flash-build-bundle".
  upload_build_bundle:
    name: Upload combined build bundle
    needs:
      - buildpypi
      - buildpyinstaller
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: Download wheel distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: bundle/wheels
      - name: Download PyInstaller binaries
        uses: actions/download-artifact@v4
        with:
          pattern: tt-flash-*
          path: bundle/pyinstaller
      - name: Upload build bundle
        uses: actions/upload-artifact@v4
        with:
          name: tt-flash-build-bundle
          path: bundle/
